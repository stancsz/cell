
# =============================================================================
# Cell Agent — Realistic SOTA Evaluation Scenarios
#
# Design rationale:
#   These scenarios are written from the perspective of a real developer who
#   would actually type this into Claude Code, Codex CLI, or OpenClaw.
#   Each scenario:
#     - Has a single, open-ended human-phrased goal (not an enumerated task list)
#     - Requires multi-step reasoning and tool chaining to complete
#     - Includes error-recovery paths (bad code that must be fixed)
#     - Tests memory persistence (recall from earlier prompts)
#     - Verifies real artifacts, not synthetic SUCCESS.txt sentinels
#     - Reflects work a developer would genuinely outsource to an AI agent
#
# Graders should check the `success_criteria` section for verifiable artifacts.
# =============================================================================

scenarios:

  # ---------------------------------------------------------------------------
  # SCENARIO 1 — "Debug my broken test suite"
  #   Mirrors: "claude code, my tests are failing, fix them"
  # ---------------------------------------------------------------------------
  - name: "debug_broken_pytest_suite"
    category: "debugging"
    difficulty: "medium"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      I have a Python project in `eval_debug_proj/`. Create it for me with the
      following broken state, then automatically find and fix all the bugs so
      that `pytest eval_debug_proj/` passes with zero failures.

      The project should have:
        - `eval_debug_proj/calculator.py` with an `add(a, b)` function that has
          an off-by-one bug (returns a + b + 1 instead of a + b) and a
          `divide(a, b)` function with no zero-division guard.
        - `eval_debug_proj/test_calculator.py` that tests add(2, 3) == 5 and
          divide(10, 0) raises ZeroDivisionError.
        - `eval_debug_proj/__init__.py` (empty)

      After creating the broken project, run pytest, observe the failures,
      fix the source code, and run pytest again to confirm it passes.
      Write a file `eval_debug_proj/FIXED.md` summarising what bugs you found
      and what changes you made.

    success_criteria:
      files_must_exist:
        - "eval_debug_proj/calculator.py"
        - "eval_debug_proj/test_calculator.py"
        - "eval_debug_proj/FIXED.md"
      commands_must_pass:
        - "python -m pytest eval_debug_proj/ -v"
      file_must_contain:
        - path: "eval_debug_proj/FIXED.md"
          contains: "bug"
        - path: "eval_debug_proj/calculator.py"
          not_contains: "+ 1"   # the off-by-one must be removed
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 2 — "Scaffold a REST API from scratch"
  #   Mirrors: a real "claude code, create a flask API for me" session
  # ---------------------------------------------------------------------------
  - name: "scaffold_flask_rest_api"
    category: "code_generation"
    difficulty: "medium"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      Create a small but fully working Flask REST API in `eval_api/`.

      Requirements:
        - `eval_api/app.py` — Flask app with these routes:
            GET  /items           → returns JSON list of items (in-memory list)
            POST /items           → accepts JSON {"name": str}, appends to list,
                                    returns the new item with an auto-incremented id
            GET  /items/<id>      → returns a single item or 404
            DELETE /items/<id>    → removes item or 404
        - `eval_api/test_app.py` — pytest tests using Flask test client that
          cover all four routes including the 404 cases.
        - `eval_api/requirements.txt` — lists flask and pytest.
        - `eval_api/README.md` — 5-line usage doc.

      After writing all files, run `python -m pytest eval_api/test_app.py -v`
      to confirm the tests pass. If any test fails, fix the source and rerun.
      Do NOT stop until pytest exits 0.

    success_criteria:
      files_must_exist:
        - "eval_api/app.py"
        - "eval_api/test_app.py"
        - "eval_api/requirements.txt"
        - "eval_api/README.md"
      commands_must_pass:
        - "python -m pytest eval_api/test_app.py -v"
      file_must_contain:
        - path: "eval_api/app.py"
          contains: "@app.route"
        - path: "eval_api/test_app.py"
          contains: "def test_"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 3 — "Refactor a messy file into modules"
  #   Mirrors: "this monolith is 500 lines, split it up"
  # ---------------------------------------------------------------------------
  - name: "refactor_monolith_to_modules"
    category: "refactoring"
    difficulty: "hard"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      I have a monolithic Python script. Create it, then refactor it.

      Step 1 — create `eval_refactor/monolith.py` with these sections all in
      one file:
        - A `Config` dataclass with fields: host, port, debug (with defaults).
        - A `DatabaseClient` class with `connect()` and `query(sql)` methods
          (stubs that print and return dummy data).
        - A `ReportGenerator` class with `generate(data)` that formats data
          as a markdown table.
        - A `main()` function that wires them: creates Config, connects DB,
          queries "SELECT * FROM orders", generates a report, prints it.

      Step 2 — refactor into separate modules under `eval_refactor/`:
        - `config.py`     — Config dataclass
        - `database.py`   — DatabaseClient
        - `reports.py`    — ReportGenerator
        - `main.py`       — main() that imports from the three modules

      Step 3 — delete `monolith.py`.
      Step 4 — verify `python eval_refactor/main.py` runs with no errors.
      Step 5 — write `eval_refactor/REFACTOR_LOG.md` listing every module
      created and what was moved into it.

    success_criteria:
      files_must_exist:
        - "eval_refactor/config.py"
        - "eval_refactor/database.py"
        - "eval_refactor/reports.py"
        - "eval_refactor/main.py"
        - "eval_refactor/REFACTOR_LOG.md"
      files_must_not_exist:
        - "eval_refactor/monolith.py"
      commands_must_pass:
        - "python eval_refactor/main.py"
      file_must_contain:
        - path: "eval_refactor/REFACTOR_LOG.md"
          contains: "config.py"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 4 — "Remember project context across steps"
  #   Tests: agent memory (remember + search_memory)
  #   Mirrors: multi-session Claude Code workflow
  # ---------------------------------------------------------------------------
  - name: "memory_persistence_workflow"
    category: "memory"
    difficulty: "medium"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      This is a two-phase task to test your persistent memory.

      PHASE 1 — Capture context:
        Remember the following facts using your memory tool:
          1. "Project codename is FALCON"
          2. "Primary language is Python 3.11"
          3. "Database is PostgreSQL 15 running on localhost:5432"
          4. "Deploy target is Render.com"
        Then write a file `eval_memory/phase1_done.txt` with content "Phase 1 complete".

      PHASE 2 — Demonstrate recall (do this in the same run):
        Search your memory for "FALCON". Use whatever you find to write
        `eval_memory/project_brief.md` — a brief with:
          - Project codename
          - Language and version
          - Database connection string
          - Deployment platform
        The brief must be populated from your recalled memory, not hardcoded.
        Finally write `eval_memory/phase2_done.txt` with "Phase 2 complete".

    success_criteria:
      files_must_exist:
        - "eval_memory/phase1_done.txt"
        - "eval_memory/project_brief.md"
        - "eval_memory/phase2_done.txt"
      file_must_contain:
        - path: "eval_memory/project_brief.md"
          contains: "FALCON"
        - path: "eval_memory/project_brief.md"
          contains: "PostgreSQL"
        - path: "eval_memory/project_brief.md"
          contains: "Render"
      memory_recall: true

  # ---------------------------------------------------------------------------
  # SCENARIO 5 — "Add a feature, write tests, ship it"
  #   Mirrors: "add pagination to my API and make sure tests cover it"
  #   This is the closest to a real Claude Code / Codex session
  # ---------------------------------------------------------------------------
  - name: "feature_add_with_tests"
    category: "feature_development"
    difficulty: "hard"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      You are adding a new feature to an existing codebase.

      Step 1 — Create the base project in `eval_feature/`:
        - `store.py` — a simple in-memory key-value store class `KVStore` with
          `set(key, val)`, `get(key)`, `delete(key)`, `list_keys()` methods.
        - `test_store.py` — basic tests for the four methods.
        Run pytest and confirm they pass before moving on.

      Step 2 — Add a new feature to `store.py`:
        - Add a `history(key)` method that returns a list of all past values
          that were set for that key (not just the current one).
        - Add a `snapshot()` method that returns a copy of the entire current
          store as a dict.

      Step 3 — Write new tests in `test_store.py` for `history()` and
      `snapshot()`. Run pytest again and fix any failures before stopping.

      Step 4 — Write `eval_feature/CHANGELOG.md` with a "## v1.1.0" section
      describing the two new methods.

    success_criteria:
      files_must_exist:
        - "eval_feature/store.py"
        - "eval_feature/test_store.py"
        - "eval_feature/CHANGELOG.md"
      commands_must_pass:
        - "python -m pytest eval_feature/test_store.py -v"
      file_must_contain:
        - path: "eval_feature/store.py"
          contains: "def history"
        - path: "eval_feature/store.py"
          contains: "def snapshot"
        - path: "eval_feature/test_store.py"
          contains: "test_history"
        - path: "eval_feature/CHANGELOG.md"
          contains: "v1.1.0"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 6 — "Investigate and explain a codebase"
  #   Mirrors: "claude, read this repo and give me a report"
  #   Tests: read_file, run_command, structured reporting
  # ---------------------------------------------------------------------------
  - name: "codebase_investigation_report"
    category: "analysis"
    difficulty: "medium"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      Investigate the Cell project's own source code (in the `src/cell/`
      directory of the current working directory) and produce a technical
      report WITHOUT modifying any source files.

      Your report should be written to `eval_report/cell_analysis.md` and must
      include:
        1. **Architecture Overview** — describe the vascular loop, MCP tool
           loading, and TUI in your own words (not copied verbatim).
        2. **Tool Inventory** — list every tool the agent exposes, with a
           one-line description of each.
        3. **Identified Risks / Limitations** — at least 3 real usability or
           reliability concerns you can identify from reading the code.
        4. **Improvement Suggestions** — at least 2 concrete, actionable
           suggestions a developer could implement.
        5. **Line Count** — run a command to count lines in each .py file in
           src/cell/ and include the results in a table.

      Do not modify any source files. Only read and analyse.

    success_criteria:
      files_must_exist:
        - "eval_report/cell_analysis.md"
      files_must_not_exist: []
      file_must_contain:
        - path: "eval_report/cell_analysis.md"
          contains: "vascular"
        - path: "eval_report/cell_analysis.md"
          contains: "Limitation"
        - path: "eval_report/cell_analysis.md"
          contains: "read_file"
      source_files_unchanged: true
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 7 — "Error recovery: fix a syntax error in my script"
  #   Mirrors: clipboard paste gone wrong — agent must detect and fix
  # ---------------------------------------------------------------------------
  - name: "syntax_error_recovery"
    category: "debugging"
    difficulty: "easy"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      Create a Python script `eval_syntax/pipeline.py` with the following
      intentionally broken content (copy exactly, do not fix it first):

      ```python
      def process(data)
          result = []
          for item in data
              if item > 0:
                  result.append(item * 2
          return result

      if __name__ == "__main__"
          print(process([1, -2, 3, 0, 5]))
      ```

      Then run `python eval_syntax/pipeline.py`. Observe the error. Fix the
      script so it is valid Python. Run it again to confirm the output is:
      `[2, 6, 10]`

      Write `eval_syntax/FIX_NOTES.txt` with a one-line description of what
      was wrong.

    success_criteria:
      files_must_exist:
        - "eval_syntax/pipeline.py"
        - "eval_syntax/FIX_NOTES.txt"
      commands_must_pass:
        - "python eval_syntax/pipeline.py"
      file_must_contain:
        - path: "eval_syntax/pipeline.py"
          contains: "def process(data):"
        - path: "eval_syntax/FIX_NOTES.txt"
          contains: "syntax"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 8 — "Multi-file search and replace"
  #   Mirrors: renaming a class/function across an entire codebase
  # ---------------------------------------------------------------------------
  - name: "cross_file_rename_refactor"
    category: "refactoring"
    difficulty: "medium"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      Create a small project in `eval_rename/` with three files that all
      reference a class called `DataProcessor`:

        - `eval_rename/processor.py`   — defines class DataProcessor
        - `eval_rename/pipeline.py`    — imports and uses DataProcessor
        - `eval_rename/test_proc.py`   — tests DataProcessor

      After creating the files, rename the class from `DataProcessor` to
      `StreamProcessor` across all three files using replace_in_file.
      Verify by running `python -m pytest eval_rename/test_proc.py -v` with
      zero errors after the rename.

      Write `eval_rename/RENAME_LOG.md` listing which files were changed.

    success_criteria:
      files_must_exist:
        - "eval_rename/processor.py"
        - "eval_rename/pipeline.py"
        - "eval_rename/test_proc.py"
        - "eval_rename/RENAME_LOG.md"
      commands_must_pass:
        - "python -m pytest eval_rename/test_proc.py -v"
      file_must_contain:
        - path: "eval_rename/processor.py"
          contains: "StreamProcessor"
          not_contains: "DataProcessor"
        - path: "eval_rename/pipeline.py"
          contains: "StreamProcessor"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 9 — "One-shot: explain then implement"
  #   Mirrors: "cell, what is a trie? Build one with tests."
  # ---------------------------------------------------------------------------
  - name: "learn_then_implement"
    category: "code_generation"
    difficulty: "hard"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      I want to learn about a data structure and then have you implement it.

      1. Write `eval_trie/EXPLANATION.md` that explains what a Trie (prefix
         tree) is, why it is useful, and lists 3 real-world use cases.
         Keep it under 300 words.

      2. Implement `eval_trie/trie.py` with a `Trie` class that supports:
           - `insert(word: str) -> None`
           - `search(word: str) -> bool`
           - `starts_with(prefix: str) -> bool`
           - `delete(word: str) -> bool`  (return False if word not found)

      3. Write `eval_trie/test_trie.py` with at least 8 meaningful tests
         covering: insert+search, missing word, prefix check, delete,
         delete nonexistent, empty trie, single-char words, overlapping words.

      4. Run `python -m pytest eval_trie/test_trie.py -v`. Fix any failures.
         Only stop when all tests pass.

    success_criteria:
      files_must_exist:
        - "eval_trie/EXPLANATION.md"
        - "eval_trie/trie.py"
        - "eval_trie/test_trie.py"
      commands_must_pass:
        - "python -m pytest eval_trie/test_trie.py -v"
      file_must_contain:
        - path: "eval_trie/trie.py"
          contains: "def insert"
        - path: "eval_trie/trie.py"
          contains: "def delete"
        - path: "eval_trie/test_trie.py"
          contains: "def test_"
        - path: "eval_trie/EXPLANATION.md"
          contains: "prefix"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 10 — "Git-aware task: commit my changes"
  #   Mirrors: "cell, I just wrote some code, stage and commit it"
  #   Tests: run_command with git, awareness of working directory
  # ---------------------------------------------------------------------------
  - name: "git_commit_workflow"
    category: "devops"
    difficulty: "easy"
    comparable_to: ["openclaw", "claude_code"]

    instructions: |
      Create a new directory `eval_git_wf/` and work inside it.

      1. Run `git init eval_git_wf` to initialise a new git repo.
      2. Create `eval_git_wf/hello.py` with a function `greet(name)` that
         returns `f"Hello, {name}!"`.
      3. Create `eval_git_wf/.gitignore` with `__pycache__/` and `*.pyc`.
      4. Run `git -C eval_git_wf add .`
      5. Run `git -C eval_git_wf commit -m "feat: add greet function"`.
      6. Verify the commit exists: run `git -C eval_git_wf log --oneline`
         and write the output to `eval_git_wf/COMMIT_LOG.txt`.
      7. Make a second change: add a `farewell(name)` function to `hello.py`.
      8. Add and commit with message "feat: add farewell function".
      9. Write `eval_git_wf/COMMIT_LOG.txt` again with the updated log
         (should now show 2 commits).

    success_criteria:
      files_must_exist:
        - "eval_git_wf/hello.py"
        - "eval_git_wf/.gitignore"
        - "eval_git_wf/COMMIT_LOG.txt"
      file_must_contain:
        - path: "eval_git_wf/hello.py"
          contains: "def greet"
        - path: "eval_git_wf/hello.py"
          contains: "def farewell"
        - path: "eval_git_wf/COMMIT_LOG.txt"
          contains: "farewell"
        - path: "eval_git_wf/COMMIT_LOG.txt"
          contains: "greet"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 11 — "Build and test a CSV data pipeline"
  #   Mirrors: "cell, I have sales CSVs, clean them and produce a summary"
  #   Tests: file I/O, stdlib csv, data transformation, run_command validation
  # ---------------------------------------------------------------------------
  - name: "csv_data_pipeline"
    category: "data_engineering"
    difficulty: "hard"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      Build a small data pipeline in `eval_pipeline/`.

      Step 1 — Write a Python script `eval_pipeline/generate_data.py` that
      creates two CSV files:
        - `eval_pipeline/data/sales_jan.csv` with columns: date, product, qty, price
          and at least 5 rows of realistic-looking dummy data.
        - `eval_pipeline/data/sales_feb.csv` with the same columns and 5 rows.
      Run the script to produce the CSVs.

      Step 2 — Write `eval_pipeline/pipeline.py` that:
        - Reads both CSVs using the stdlib `csv` module (no pandas).
        - Combines the rows.
        - Computes per-product totals: total_qty and total_revenue (qty * price).
        - Writes results to `eval_pipeline/output/summary.csv` with columns:
          product, total_qty, total_revenue.
        - Prints a formatted table of results to stdout.

      Step 3 — Run `python eval_pipeline/pipeline.py` and verify it prints
      output and creates `eval_pipeline/output/summary.csv`.

      Step 4 — Write `eval_pipeline/test_pipeline.py` that:
        - Creates two minimal in-memory CSV strings.
        - Passes them through your pipeline logic.
        - Asserts the summary totals are correct.
      Run pytest on it and fix failures before stopping.

    success_criteria:
      files_must_exist:
        - "eval_pipeline/generate_data.py"
        - "eval_pipeline/pipeline.py"
        - "eval_pipeline/test_pipeline.py"
        - "eval_pipeline/data/sales_jan.csv"
        - "eval_pipeline/data/sales_feb.csv"
        - "eval_pipeline/output/summary.csv"
      commands_must_pass:
        - "python -m pytest eval_pipeline/test_pipeline.py -v"
      file_must_contain:
        - path: "eval_pipeline/pipeline.py"
          contains: "total_revenue"
        - path: "eval_pipeline/output/summary.csv"
          contains: "product"
        - path: "eval_pipeline/test_pipeline.py"
          contains: "def test_"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 12 — "Write a real argparse CLI tool"
  #   Mirrors: "cell, make me a CLI utility I can actually ship"
  #   Tests: argparse, --help, subcommands, integration test via run_command
  # ---------------------------------------------------------------------------
  - name: "argparse_cli_tool"
    category: "tooling"
    difficulty: "medium"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      Create a command-line text utility in `eval_cli/`.

      The tool is `eval_cli/textool.py`. It must support these subcommands:

        python textool.py count <file>
            — prints word count, line count, and char count of a file

        python textool.py find <file> <pattern>
            — searches the file line by line and prints matching lines
              with line numbers (like grep -n)

        python textool.py replace <file> <old> <new> --inplace
            — replaces first occurrence of <old> with <new> in the file;
              with --inplace it modifies the file, otherwise prints result

      Implementation requirements:
        - Use argparse with subparsers. Include a useful --help string on
          each subcommand.
        - Do not use any third-party packages.

      After writing the tool:
        1. Create `eval_cli/sample.txt` with at least 10 lines of text
           containing the word "python" at least twice.
        2. Run `python eval_cli/textool.py count eval_cli/sample.txt` and
           confirm it prints numbers.
        3. Run `python eval_cli/textool.py find eval_cli/sample.txt python`
           and confirm it prints matching lines.
        4. Run `python eval_cli/textool.py --help` to verify the help works.
        5. Write `eval_cli/test_textool.py` with tests for all three
           subcommands. Run pytest and fix failures.

    success_criteria:
      files_must_exist:
        - "eval_cli/textool.py"
        - "eval_cli/sample.txt"
        - "eval_cli/test_textool.py"
      commands_must_pass:
        - "python eval_cli/textool.py --help"
        - "python eval_cli/textool.py count eval_cli/sample.txt"
        - "python -m pytest eval_cli/test_textool.py -v"
      file_must_contain:
        - path: "eval_cli/textool.py"
          contains: "add_subparsers"
        - path: "eval_cli/textool.py"
          contains: "def "
        - path: "eval_cli/test_textool.py"
          contains: "def test_"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 13 — "Add logging and observability to existing code"
  #   Mirrors: "this script runs but I have no idea what it's doing, add logs"
  #   Tests: replace_in_file surgical edits, logging stdlib, structured output
  # ---------------------------------------------------------------------------
  - name: "add_logging_to_existing_code"
    category: "observability"
    difficulty: "medium"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      You need to add production-grade logging to an existing module.

      Step 1 — Create `eval_logging/worker.py` with the following stub
      (write it exactly as given, do not add logging yet):

        import time, random

        def fetch_item(item_id):
            time.sleep(0.01)
            if random.random() < 0.2:
                raise ValueError(f"item {item_id} not found")
            return {"id": item_id, "value": random.randint(1, 100)}

        def process_batch(ids):
            results, errors = [], []
            for id in ids:
                try:
                    results.append(fetch_item(id))
                except ValueError as e:
                    errors.append(str(e))
            return results, errors

        if __name__ == "__main__":
            ok, err = process_batch(range(10))
            print(f"ok={len(ok)} errors={len(err)}")

      Step 2 — Using replace_in_file (not a full rewrite), add:
        - A module-level logger: `logger = logging.getLogger(__name__)`
        - DEBUG log at the start of fetch_item: "Fetching item {item_id}"
        - WARNING log when ValueError is caught: "Failed: {e}"
        - INFO log at the end of process_batch: "Batch done: {len(results)} ok, {len(errors)} errors"

      Step 3 — Write `eval_logging/run_worker.py` that configures logging
      to write to `eval_logging/worker.log` at DEBUG level, then calls
      `process_batch(range(20))` and prints the summary.

      Step 4 — Run `python eval_logging/run_worker.py`.
      Verify `eval_logging/worker.log` exists and contains log entries.

      Step 5 — Write `eval_logging/test_logging.py` that imports worker,
      calls process_batch with a small list, and asserts:
        - Return type is a tuple of two lists.
        - No uncaught exceptions.
      Run pytest.

    success_criteria:
      files_must_exist:
        - "eval_logging/worker.py"
        - "eval_logging/run_worker.py"
        - "eval_logging/worker.log"
        - "eval_logging/test_logging.py"
      commands_must_pass:
