        from collections import defaultdict

        def group_by(items, key_fn):
            groups = defaultdict(list)
            for item in items:
                groups[key_fn(item)].append(item)
            return dict(groups)

        def flatten(nested):
            result = []
            for item in nested:
                if isinstance(item, list):
                    result.extend(flatten(item))
                else:
                    result.append(item)
            return result

        def chunk(lst, size):
            return [lst[i:i+size] for i in range(0, len(lst), size)]

        def merge_dicts(*dicts):
            result = {}
            for d in dicts:
                result.update(d)
            return result

        class Pipeline:
            def __init__(self):
                self.steps = []
            def add_step(self, fn):
                self.steps.append(fn)
                return self
            def run(self, data):
                for step in self.steps:
                    data = step(data)
                return data

      Step 2 — Read the file. Using replace_in_file, add full type annotations
      to every function and method. Use generics (TypeVar, list[T], dict[K,V],
      Callable) from the `typing` module where needed. Do not change logic.

      Step 3 — Run `python -m py_compile eval_types/legacy.py` to verify syntax.
        Then run `python -m mypy eval_types/legacy.py --ignore-missing-imports`.
        Fix any mypy errors reported. Rerun until mypy exits 0.

      Step 4 — Write `eval_types/test_legacy.py` with tests proving the
      functions still work correctly after annotation:
        - group_by groups a list of dicts by a key.
        - flatten handles 3-level nesting.
        - chunk splits evenly and handles remainder.
        - merge_dicts last key wins.
        - Pipeline chains two transform functions.
      Run pytest.

    success_criteria:
      files_must_exist:
        - "eval_types/legacy.py"
        - "eval_types/test_legacy.py"
      commands_must_pass:
        - "python -m py_compile eval_types/legacy.py"
        - "python -m pytest eval_types/test_legacy.py -v"
      file_must_contain:
        - path: "eval_types/legacy.py"
          contains: "TypeVar"
        - path: "eval_types/legacy.py"
          contains: "Callable"
        - path: "eval_types/legacy.py"
          contains: "-> dict"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 24 — "Recursive directory diff tool"
  #   Mirrors: "cell, compare two snapshots of my project folder"
  #   Tests: os.walk, hashing, recursive comparison, structured report
  # ---------------------------------------------------------------------------
  - name: "directory_tree_differ"
    category: "tooling"
    difficulty: "hard"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      Build a directory comparison tool in `eval_diff/`.

      Write `eval_diff/dirdiffer.py` with:
        - `hash_file(path)` — returns MD5 hex digest of file contents.
        - `snapshot(root)` — walks a directory tree and returns a dict:
            { relative_path: md5_hash }  for every file.
        - `diff(snap_a, snap_b)` — compares two snapshots and returns a dict:
            {
              "added":    [paths in b but not a],
              "removed":  [paths in a but not b],
              "modified": [paths in both but with different hash],
              "unchanged": [paths identical in both]
            }
        - `report(diff_result, output_path)` — writes a markdown file with
          four sections listing the files under each category.

      Write `eval_diff/run.py` as a CLI:
          python run.py <dir_a> <dir_b> [--output report.md]
        Uses argparse. Prints summary counts and writes the report.

      Write `eval_diff/test_dirdiffer.py` that:
        - Uses tmp_path to create two directory trees with known differences:
            dir_a: file1.txt ("hello"), file2.txt ("world"), file3.txt ("old")
            dir_b: file1.txt ("hello"), file2.txt ("CHANGED"),  file4.txt ("new")
          (file3 removed, file4 added, file2 modified, file1 unchanged)
        - Asserts diff() produces exactly the right categorization.
        - Asserts report() creates a file containing all four section names.
      Run pytest. Fix all failures.

    success_criteria:
      files_must_exist:
        - "eval_diff/dirdiffer.py"
        - "eval_diff/run.py"
        - "eval_diff/test_dirdiffer.py"
      commands_must_pass:
        - "python -m pytest eval_diff/test_dirdiffer.py -v"
      file_must_contain:
        - path: "eval_diff/dirdiffer.py"
          contains: "def snapshot"
        - path: "eval_diff/dirdiffer.py"
          contains: "def diff"
        - path: "eval_diff/dirdiffer.py"
          contains: "hashlib"
        - path: "eval_diff/test_dirdiffer.py"
          contains: "modified"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 25 — "Token bucket rate limiter"
  #   Mirrors: "cell, I'm getting hammered by the API, add rate limiting"
  #   Tests: time-based algorithm, thread safety, decorator, burst handling
  # ---------------------------------------------------------------------------
  - name: "token_bucket_rate_limiter"
    category: "systems"
    difficulty: "hard"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      Implement a token bucket rate limiter in `eval_ratelimit/`.

      Write `eval_ratelimit/limiter.py` with:
        - `TokenBucket` class:
            `__init__(self, rate: float, capacity: float)`
              rate = tokens added per second; capacity = max tokens.
            `consume(tokens=1.0) -> bool`
              Returns True if tokens available (and consumes them), False otherwise.
              Refills proportionally to elapsed time since last call.
            `wait_and_consume(tokens=1.0, timeout=None) -> bool`
              Blocks (sleeps in small increments) until tokens available or
              timeout exceeded. Returns True on success.
            Thread-safe via threading.Lock.

        - `RateLimiter` class managing multiple named buckets:
            `__init__(self, rules: dict[str, tuple[float, float]])`
              rules = {name: (rate, capacity)}
            `is_allowed(name: str, tokens=1.0) -> bool`
            `wait(name: str, tokens=1.0, timeout=None) -> bool`

        - `@rate_limited(rate, capacity)` decorator that wraps a function,
          raises `RateLimitExceeded` (custom exception) if consume() fails.

      Write `eval_ratelimit/test_limiter.py` testing:
        - Full bucket allows first N calls, then denies.
        - Bucket refills after sleeping the right amount.
        - wait_and_consume blocks and eventually succeeds.
        - wait_and_consume returns False if timeout exceeded before refill.
        - 20 threads calling consume() concurrently never exceed capacity.
        - The decorator raises RateLimitExceeded correctly.
      Run pytest. Fix all failures.

    success_criteria:
      files_must_exist:
        - "eval_ratelimit/limiter.py"
        - "eval_ratelimit/test_limiter.py"
      commands_must_pass:
        - "python -m pytest eval_ratelimit/test_limiter.py -v"
      file_must_contain:
        - path: "eval_ratelimit/limiter.py"
          contains: "threading.Lock"
        - path: "eval_ratelimit/limiter.py"
          contains: "def consume"
        - path: "eval_ratelimit/limiter.py"
          contains: "RateLimitExceeded"
        - path: "eval_ratelimit/test_limiter.py"
          contains: "refill"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 26 — "In-process event bus with middleware"
  #   Mirrors: "cell, I want a lightweight pub/sub so modules don't import each other"
  #   Tests: observer pattern, middleware chain, async handlers, wildcard topics
  # ---------------------------------------------------------------------------
  - name: "event_bus_with_middleware"
    category: "architecture"
    difficulty: "hard"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      Build an in-process event bus in `eval_eventbus/`.

      Write `eval_eventbus/bus.py` with:
        - `Event` dataclass: topic (str), payload (any), metadata (dict default {}).
        - `EventBus` class:
            `subscribe(topic, handler, priority=0)`
              handler is a callable(event). Higher priority runs first.
              topic supports "*" wildcard that matches every event.
            `unsubscribe(topic, handler)`
            `publish(event: Event)` — calls all matching handlers in
              priority order. Catches and logs handler exceptions (never crash).
            `use(middleware)` — registers middleware. Middleware is a callable
              `(event, next_fn) -> None` where calling next_fn(event) continues
              the chain. Applied before handlers.

        - Built-in middleware:
            `logging_middleware` — logs event.topic and type(event.payload).
            `filter_middleware(excluded_topics)` — drops events whose topic
              is in excluded_topics (calls next_fn only if not excluded).

      Write `eval_eventbus/test_bus.py` testing:
        - subscribe/publish delivers to registered handler.
        - Multiple handlers called in priority order.
        - Wildcard "*" handler receives all events.
        - Handler exception does not prevent other handlers from running.
        - Middleware chain: logging_middleware logs before handlers fire.
        - filter_middleware stops excluded events before handlers.
        - unsubscribe stops delivery.
      Run pytest. Fix all failures.

    success_criteria:
      files_must_exist:
        - "eval_eventbus/bus.py"
        - "eval_eventbus/test_bus.py"
      commands_must_pass:
        - "python -m pytest eval_eventbus/test_bus.py -v"
      file_must_contain:
        - path: "eval_eventbus/bus.py"
          contains: "def publish"
        - path: "eval_eventbus/bus.py"
          contains: "def use"
        - path: "eval_eventbus/bus.py"
          contains: "wildcard"
        - path: "eval_eventbus/test_bus.py"
          contains: "priority"
        - path: "eval_eventbus/test_bus.py"
          contains: "middleware"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 27 — "Dependency graph resolver with cycle detection"
  #   Mirrors: "cell, build a task runner that respects dependencies like Make"
  #   Tests: topological sort, cycle detection, parallel-ready order, CLI
  # ---------------------------------------------------------------------------
  - name: "dependency_graph_resolver"
    category: "algorithms"
    difficulty: "hard"
    comparable_to: ["claude_code", "openclaw"]

    instructions: |
      Build a dependency resolver in `eval_depgraph/`.

      Write `eval_depgraph/resolver.py` with:
        - `DependencyGraph` class:
            `add_node(name: str, deps: list[str] = [])` — register a node.
            `resolve() -> list[str]` — returns nodes in topological order
              (all deps before dependents). Raises `CyclicDependencyError`
              (custom exception) if a cycle exists. Uses Kahn's algorithm
              or DFS with colouring — your choice, but must be explicit.
            `parallel_stages() -> list[list[str]]` — groups nodes into
              stages where all nodes in a stage have their deps satisfied
              by previous stages. Nodes in the same stage can run in parallel.
            `ancestors(name) -> set[str]` — all transitive dependencies of node.
            `dependents(name) -> set[str]` — all nodes that (transitively)
              depend on node.

      Write `eval_depgraph/test_resolver.py` testing:
        - Linear chain: A→B→C resolves as [A, B, C] (or reverse if deps listed).
        - Diamond: A→{B,C}→D resolves with D last, B/C in same stage.
        - Cycle: A→B→A raises CyclicDependencyError.
        - parallel_stages groups independent nodes together.
        - ancestors(D) in diamond returns {A, B, C}.
        - dependents(A) in diamond returns {B, C, D}.
        - Empty graph resolves to [].
        - Single node with no deps resolves to [node].
      Run pytest. Fix all failures.

      Write `eval_depgraph/ALGORITHM.md` explaining in plain English which
      algorithm you chose and why, with a worked example.

    success_criteria:
      files_must_exist:
        - "eval_depgraph/resolver.py"
        - "eval_depgraph/test_resolver.py"
        - "eval_depgraph/ALGORITHM.md"
      commands_must_pass:
        - "python -m pytest eval_depgraph/test_resolver.py -v"
      file_must_contain:
        - path: "eval_depgraph/resolver.py"
          contains: "CyclicDependencyError"
        - path: "eval_depgraph/resolver.py"
          contains: "def parallel_stages"
        - path: "eval_depgraph/resolver.py"
          contains: "def ancestors"
        - path: "eval_depgraph/test_resolver.py"
          contains: "CyclicDependencyError"
      memory_recall: false

  # ---------------------------------------------------------------------------
  # SCENARIO 28 — "Full TDD red-green-refactor cycle"
  #   Mirrors: "cell, write the tests first, then make them pass, then clean up"
  #   Tests: agent follows TDD discipline, red→green→refactor all verified
  # ---------------------------------------------------------------------------
  - name: "tdd_red_green_refactor"
    category: "testing"
    difficulty: "hard"
    comparable_to: ["claude_code", "codex_cli", "openclaw"]

    instructions: |
      You will implement a `BankAccount` class using strict TDD in `eval_tdd/`.

      PHASE RED — write failing tests first (before any implementation):
        Write `eval_tdd/test_account.py` with tests covering:
          - `deposit(amount)` increases balance by amount.
          - `withdraw(amount)` decreases balance; raises `InsufficientFunds`
            if amount > balance.
          - `transfer(amount, target_account)` moves money between accounts.
          - `balance` property returns current balance.
          - Depositing zero or negative raises `ValueError`.
          - Withdrawing zero or negative raises `ValueError`.
          - New account has balance 0.
          - Transaction history: `history()` returns list of (type, amount) tuples.
        Create `eval_tdd/account.py` as an empty stub (just `pass`).
        Run pytest — it MUST fail. Record failure count in `eval_tdd/RED.txt`.

      PHASE GREEN — minimum code to pass:
        Implement `eval_tdd/account.py` with just enough code to make all
        tests pass. No extra features.
        Run pytest — all must pass. Record pass count in `eval_tdd/GREEN.txt`.

      PHASE REFACTOR — improve without breaking:
        Refactor `eval_tdd/account.py`:
          - Extract a private `_validate_amount(amount)` method used by
            both deposit and withdraw.
          - Add a `__repr__` showing account id and balance.
          - Add a class-level `_next_id` counter so each account gets a
            unique integer id.
        Run pytest again — still all pass. Record in `eval_tdd/REFACTOR.txt`.

      Final: all three phase files must exist, and pytest must still exit 0.

    success_criteria:
      files_must_exist:
        - "eval_tdd/test_account.py"
        - "eval_tdd/account.py"
        - "eval_tdd/RED.txt"
        - "eval_tdd/GREEN.txt"
        - "eval_tdd/REFACTOR.txt"
      commands_must_pass:
        - "python -m pytest eval_tdd/test_account.py -v"
      file_must_contain:
        - path: "eval_tdd/account.py"
          contains: "InsufficientFunds"
        - path: "eval_tdd/account.py"
          contains: "_validate_amount"
        - path: "eval_tdd/account.py"
          contains: "_next_id"
        - path: "eval_tdd/test_account.py"
          contains: "def test_history"
        - path: "eval_tdd/RED.txt"
          contains: "fail"
      memory_recall: false

# =============================================================================
# Test runner instructions (for use with test_app.py or a custom harness)
# =============================================================================
runner:
  # Maximum wall-clock seconds to allow before declaring a scenario failed.
  timeout_seconds: 300

  # Each scenario runs in a fresh tmp_path (via pytest tmp_path fixture).
  # The agent's cwd is set to tmp_path before the instructions are submitted.
  cwd: tmp_path

  # Grading: pass = all success_criteria satisfied.
  # Partial credit: count how many criteria pass (for comparative benchmarks).
  grading: strict_all_or_nothing
